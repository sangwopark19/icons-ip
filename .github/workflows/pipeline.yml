name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: "26"
  SUPABASE_CLI_VERSION: "2.101.0"
  VERCEL_CLI_VERSION: "54.14.2"

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Start local Supabase database
        run: supabase db start

      - name: Apply local migrations
        run: supabase db reset --local

      - name: Run community database smoke tests
        run: docker exec -i supabase_db_icons-ip psql -U postgres -d postgres -v ON_ERROR_STOP=1 < supabase/tests/community_comment_like_actions.sql

      - name: Lint local database
        run: supabase db lint --local --fail-on error

  deploy-supabase:
    name: deploy-supabase
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Check Supabase deployment secrets
        run: |
          missing=0
          for name in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing GitHub secret::$name is required for Supabase deployment"
              missing=1
            fi
          done
          exit "$missing"

      - name: Sync and verify Supabase Auth configuration
        env:
          SUPABASE_AUTH_SITE_URL: https://iconsip.com
          SUPABASE_AUTH_REDIRECT_URLS: |
            https://iconsip.com/auth/callback
            https://www.iconsip.com/auth/callback
            https://icons-ip.vercel.app/auth/callback
            https://icons-ip-*.vercel.app/auth/callback
            http://localhost:3000/auth/callback
            http://127.0.0.1:3000/auth/callback
        run: |
          set -euo pipefail

          config_file="$(mktemp)"
          status="$(curl -sS -o "$config_file" -w '%{http_code}' \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/config/auth")"

          if [ "$status" != "200" ]; then
            message="$(jq -r '.message // .error // "unknown error"' "$config_file" 2>/dev/null || true)"
            echo "::error title=Supabase Auth config read failed::HTTP $status ${message}"
            exit 1
          fi

          current_site_url="$(jq -r '.site_url // ""' "$config_file")"
          current_allow_list="$(jq -r '.uri_allow_list // ""' "$config_file")"
          required_redirect_urls="$(printf '%s\n' "$SUPABASE_AUTH_REDIRECT_URLS" | sed '/^$/d' | jq -R . | jq -s .)"

          smtp_missing="$(jq -r '
            [
              (select(.external_email_enabled != true) | "external_email_enabled"),
              (select((.smtp_host // "") == "") | "smtp_host"),
              (select((.smtp_port // "") == "") | "smtp_port"),
              (select((.smtp_user // "") == "") | "smtp_user"),
              (select((.smtp_admin_email // "") == "") | "smtp_admin_email")
            ]
            | map(select(. != null))
            | join(", ")
          ' "$config_file")"

          if [ -n "$smtp_missing" ]; then
            echo "::error title=Supabase custom SMTP is required::Missing or disabled Auth SMTP settings: $smtp_missing"
            echo "Configure custom SMTP in Supabase Auth before production deploy. Do not commit SMTP credentials."
            exit 1
          fi

          missing_count="$(jq -nr \
            --arg current "$current_allow_list" \
            --argjson required "$required_redirect_urls" '
              def trim: gsub("^\\s+|\\s+$"; "");
              ($current | split(",") | map(trim) | map(select(length > 0))) as $existing
              | [$required[] as $url | select(($existing | index($url)) | not)]
              | length
            ')"

          updated_allow_list="$(jq -nr \
            --arg current "$current_allow_list" \
            --argjson required "$required_redirect_urls" '
              def trim: gsub("^\\s+|\\s+$"; "");
              ($current | split(",") | map(trim) | map(select(length > 0))) as $existing
              | reduce $required[] as $url ($existing; if index($url) then . else . + [$url] end)
              | join(",")
            ')"

          current_mailer_autoconfirm="$(jq -r '.mailer_autoconfirm // ""' "$config_file")"
          current_secure_email_change="$(jq -r '.mailer_secure_email_change_enabled // ""' "$config_file")"
          current_rate_limit_email_sent="$(jq -r '.rate_limit_email_sent // ""' "$config_file")"

          if [ "$current_site_url" = "$SUPABASE_AUTH_SITE_URL" ] \
            && [ "$missing_count" = "0" ] \
            && [ "$current_mailer_autoconfirm" = "false" ] \
            && [ "$current_secure_email_change" = "true" ] \
            && [ "$current_rate_limit_email_sent" = "30" ]; then
            echo "Supabase Auth configuration is already up to date."
            exit 0
          fi

          patch_file="$(mktemp)"
          jq -n \
            --arg site_url "$SUPABASE_AUTH_SITE_URL" \
            --arg uri_allow_list "$updated_allow_list" \
            '{
              site_url: $site_url,
              uri_allow_list: $uri_allow_list,
              mailer_autoconfirm: false,
              mailer_secure_email_change_enabled: true,
              rate_limit_email_sent: 30
            }' > "$patch_file"

          updated_file="$(mktemp)"
          patch_status="$(curl -sS -o "$updated_file" -w '%{http_code}' \
            -X PATCH \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary "@$patch_file" \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/config/auth")"

          if [ "$patch_status" != "200" ]; then
            message="$(jq -r '.message // .error // "unknown error"' "$updated_file" 2>/dev/null || true)"
            echo "::error title=Supabase Auth config update failed::HTTP $patch_status ${message}"
            exit 1
          fi

          verified_file="$(mktemp)"
          for attempt in 1 2 3 4 5; do
            verified_status="$(curl -sS -o "$verified_file" -w '%{http_code}' \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/config/auth")"

            if [ "$verified_status" != "200" ]; then
              message="$(jq -r '.message // .error // "unknown error"' "$verified_file" 2>/dev/null || true)"
              echo "::error title=Supabase Auth config verification read failed::HTTP $verified_status ${message}"
              exit 1
            fi

            verified_site_url="$(jq -r '.site_url // ""' "$verified_file")"
            verified_allow_list="$(jq -r '.uri_allow_list // ""' "$verified_file")"
            verified_mailer_autoconfirm="$(jq -r '.mailer_autoconfirm // ""' "$verified_file")"
            verified_secure_email_change="$(jq -r '.mailer_secure_email_change_enabled // ""' "$verified_file")"
            verified_rate_limit_email_sent="$(jq -r '.rate_limit_email_sent // ""' "$verified_file")"
            verified_missing_count="$(jq -nr \
              --arg current "$verified_allow_list" \
              --argjson required "$required_redirect_urls" '
                def trim: gsub("^\\s+|\\s+$"; "");
                ($current | split(",") | map(trim) | map(select(length > 0))) as $existing
                | [$required[] as $url | select(($existing | index($url)) | not)]
                | length
              ')"

            if [ "$verified_site_url" = "$SUPABASE_AUTH_SITE_URL" ] \
              && [ "$verified_missing_count" = "0" ] \
              && { [ "$verified_mailer_autoconfirm" = "false" ] || [ -z "$verified_mailer_autoconfirm" ]; } \
              && [ "$verified_secure_email_change" = "true" ] \
              && [ "$verified_rate_limit_email_sent" = "30" ]; then
              echo "Supabase Auth configuration updated."
              exit 0
            fi

            sleep "$attempt"
          done

          verified_site_url="$(jq -r '.site_url // ""' "$verified_file")"
          verified_allow_list="$(jq -r '.uri_allow_list // ""' "$verified_file")"
          verified_mailer_autoconfirm="$(jq -r '.mailer_autoconfirm // ""' "$verified_file")"
          verified_secure_email_change="$(jq -r '.mailer_secure_email_change_enabled // ""' "$verified_file")"
          verified_rate_limit_email_sent="$(jq -r '.rate_limit_email_sent // ""' "$verified_file")"
          verified_missing_count="$(jq -nr \
            --arg current "$verified_allow_list" \
            --argjson required "$required_redirect_urls" '
              def trim: gsub("^\\s+|\\s+$"; "");
              ($current | split(",") | map(trim) | map(select(length > 0))) as $existing
              | [$required[] as $url | select(($existing | index($url)) | not)]
              | length
            ')"

          if [ "$verified_site_url" != "$SUPABASE_AUTH_SITE_URL" ] \
            || [ "$verified_missing_count" != "0" ] \
            || { [ "$verified_mailer_autoconfirm" != "false" ] && [ -n "$verified_mailer_autoconfirm" ]; } \
            || [ "$verified_secure_email_change" != "true" ] \
            || [ "$verified_rate_limit_email_sent" != "30" ]; then
            echo "::error title=Supabase Auth config verification failed::site_url=${verified_site_url}, missing_redirect_count=${verified_missing_count}, mailer_autoconfirm=${verified_mailer_autoconfirm}, mailer_secure_email_change_enabled=${verified_secure_email_change}, rate_limit_email_sent=${verified_rate_limit_email_sent}"
            exit 1
          fi

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push Supabase migrations and seed
        run: supabase db push --linked --include-seed

  deploy-vercel-preview:
    name: deploy-vercel-preview
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global "vercel@${VERCEL_CLI_VERSION}"

      - name: Check Vercel deployment secrets
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing GitHub secret::$name is required for Vercel preview deployment"
              missing=1
            fi
          done
          exit "$missing"

      - name: Pull Vercel preview environment
        run: vercel pull --yes --environment=preview

      - name: Check Vercel preview Supabase environment
        run: |
          env_file=".vercel/.env.preview.local"
          missing=0

          if [ ! -f "$env_file" ]; then
            echo "::error title=Missing Vercel environment file::$env_file was not created by vercel pull"
            exit 1
          fi

          if ! grep -Eq '^NEXT_PUBLIC_SUPABASE_URL=.+$' "$env_file"; then
            echo "::error title=Missing Vercel environment::NEXT_PUBLIC_SUPABASE_URL is required for preview catalog data"
            missing=1
          fi

          if ! grep -Eq '^NEXT_PUBLIC_SUPABASE_(PUBLISHABLE_KEY|ANON_KEY)=.+$' "$env_file"; then
            echo "::error title=Missing Vercel environment::NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY or NEXT_PUBLIC_SUPABASE_ANON_KEY is required for preview catalog data"
            missing=1
          fi

          if ! grep -Eq '^AUTH_SIGNUP_RESEND_SECRET=.+$' "$env_file"; then
            echo "::error title=Missing Vercel environment::AUTH_SIGNUP_RESEND_SECRET is required for preview auth resend cooldown"
            missing=1
          fi

          exit "$missing"

      - name: Build Vercel preview output
        run: vercel build

      - name: Deploy Vercel preview output
        run: |
          deployment_url="$(vercel deploy --prebuilt)"
          echo "Preview deployment: $deployment_url" >> "$GITHUB_STEP_SUMMARY"

  deploy-vercel:
    name: deploy-vercel
    runs-on: ubuntu-latest
    needs: deploy-supabase
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global "vercel@${VERCEL_CLI_VERSION}"

      - name: Check Vercel deployment secrets
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing GitHub secret::$name is required for Vercel deployment"
              missing=1
            fi
          done
          exit "$missing"

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production

      - name: Check Vercel production Supabase environment
        run: |
          env_file=".vercel/.env.production.local"
          missing=0

          if [ ! -f "$env_file" ]; then
            echo "::error title=Missing Vercel environment file::$env_file was not created by vercel pull"
            exit 1
          fi

          if ! grep -Eq '^NEXT_PUBLIC_SUPABASE_URL=.+$' "$env_file"; then
            echo "::error title=Missing Vercel environment::NEXT_PUBLIC_SUPABASE_URL is required for production catalog data"
            missing=1
          fi

          if ! grep -Eq '^NEXT_PUBLIC_SUPABASE_(PUBLISHABLE_KEY|ANON_KEY)=.+$' "$env_file"; then
            echo "::error title=Missing Vercel environment::NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY or NEXT_PUBLIC_SUPABASE_ANON_KEY is required for production catalog data"
            missing=1
          fi

          if ! grep -Eq '^AUTH_SIGNUP_RESEND_SECRET=.+$' "$env_file"; then
            echo "::error title=Missing Vercel environment::AUTH_SIGNUP_RESEND_SECRET is required for production auth resend cooldown"
            missing=1
          fi

          exit "$missing"

      - name: Build Vercel production output
        run: vercel build --prod

      - name: Deploy Vercel production output
        run: |
          deployment_url="$(vercel deploy --prebuilt --prod)"
          echo "Production deployment: $deployment_url" >> "$GITHUB_STEP_SUMMARY"
